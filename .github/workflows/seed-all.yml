name: Seed All Content

on:
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  seed:
    name: Run All Seed Scripts
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Seed Technical Ledgers
        env:
          ACCOUNT_DATOCMS_API_TOKEN: ${{ secrets.ACCOUNT_DATOCMS_API_TOKEN }}
          UPSTASH_VECTOR_REST_URL: ${{ secrets.UPSTASH_VECTOR_REST_URL }}
          UPSTASH_VECTOR_REST_TOKEN: ${{ secrets.UPSTASH_VECTOR_REST_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: pnpm seedLedgers

      - name: Seed Book Summaries
        env:
          ACCOUNT_DATOCMS_API_TOKEN: ${{ secrets.ACCOUNT_DATOCMS_API_TOKEN }}
          UPSTASH_VECTOR_REST_URL: ${{ secrets.UPSTASH_VECTOR_REST_URL }}
          UPSTASH_VECTOR_REST_TOKEN: ${{ secrets.UPSTASH_VECTOR_REST_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: pnpm seedBookSummaries

      - name: Seed Profile
        env:
          ACCOUNT_DATOCMS_API_TOKEN: ${{ secrets.ACCOUNT_DATOCMS_API_TOKEN }}
          UPSTASH_VECTOR_REST_URL: ${{ secrets.UPSTASH_VECTOR_REST_URL }}
          UPSTASH_VECTOR_REST_TOKEN: ${{ secrets.UPSTASH_VECTOR_REST_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: pnpm seedProfile

      - name: Seed Pages
        env:
          ACCOUNT_DATOCMS_API_TOKEN: ${{ secrets.ACCOUNT_DATOCMS_API_TOKEN }}
          UPSTASH_VECTOR_REST_URL: ${{ secrets.UPSTASH_VECTOR_REST_URL }}
          UPSTASH_VECTOR_REST_TOKEN: ${{ secrets.UPSTASH_VECTOR_REST_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: pnpm seedPages

